apiVersion: apps/v1
kind: Deployment
metadata:
  name: boedor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: boedor
  template:
    metadata:
      labels:
        app: boedor
    spec:
      containers:
        - name: web
          # ponytail: untagged local image + rollout restart; add versioned tags when rollback matters
          image: boedor/web:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: boedor-env
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: boedor
spec:
  selector:
    app: boedor
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: boedor
spec:
  rules:
    - host: boedor.xyrus10.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: boedor
                port:
                  number: 80
